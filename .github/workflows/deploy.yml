name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  schedule:
    # 평일 KST 09:00~17:00 (UTC 00:00~08:00), 2시간마다 시세 갱신
    - cron: '0 0,2,4,6,8 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Fetch latest stock prices
        run: node scripts/fetch-prices.js
        continue-on-error: true  # 시세 수집 실패해도 빌드는 계속

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          commit_message: 'deploy: update prices ${{ github.sha }}'
